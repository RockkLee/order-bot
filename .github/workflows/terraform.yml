name: terraform-apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment name"
        required: true
        default: "prod"
      enable_alb:
        description: "Enable ALB"
        required: false
        default: "false"
  schedule:
    # 01:00 UTC = 09:00 Taiwan
    - cron: '0 1 * * 1-5'
    # 09:00 UTC = 17:00 Taiwan
    - cron: '0 9 * * 1-5'

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest

    env:
      # ---- From your tfvars (non-secret) ----
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

      TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
      TF_VAR_public_subnet_ids: '["${{ secrets.PUBLIC_SUBNET_ID_A }}","${{ secrets.PUBLIC_SUBNET_ID_C }}"]'
      TF_VAR_private_subnet_ids: '["${{ secrets.PRIVATE_SUBNET_ID_A }}","${{ secrets.PRIVATE_SUBNET_ID_C }}"]'
      TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}

      TF_VAR_alb_certificate_arn: ${{ secrets.ALB_CERTIFICATE_ARN }}
      TF_VAR_orderbot_domain: ${{ secrets.ORDERBOT_DOMAIN }}
      TF_VAR_orderbot_mgmt_domain: ${{ secrets.ORDERBOT_MGMT_DOMAIN }}

      TF_VAR_order_bot_image: ${{ secrets.ORDER_BOT_IMAGE }}
      TF_VAR_order_bot_mgmt_image: ${{ secrets.ORDER_BOT_MGMT_IMAGE }}

      TF_VAR_default_desired_count: ${{ secrets.DEFAULT_DESIRED_COUNT }}

      # ---- From your tfvars (secret / sensitive) ----
      # Put these in GitHub repo settings -> Secrets and variables -> Actions -> Secrets
      TF_VAR_order_bot_environment: >-
        {
          "HOST":"${{ secrets.ORDERBOT_HOST }}",
          "PORT":"${{ secrets.ORDERBOT_PORT }}",
          "ROOT_PATH":"${{ secrets.ORDERBOT_ROOT_PATH }}",
          "IS_PRODUCTION":"${{ secrets.ORDERBOT_IS_PRODUCTION }}",
          "DATABASE_URL":"${{ secrets.ORDERBOT_DATABASE_URL }}",
          "DATABASE_SCHEMA":"${{ secrets.ORDERBOT_DATABASE_SCHEMA }}",
          "SEED_MENU":"${{ secrets.ORDERBOT_SEED_MENU }}",
          "MISTRAL_API_KEY":"${{ secrets.ORDERBOT_MISTRAL_API_KEY }}",
          "MISTRAL_MODEL":"${{ secrets.ORDERBOT_MISTRAL_MODEL }}"
        }

      TF_VAR_order_bot_mgmt_environment: >-
        {
          "ADDRESS":"${{ secrets.ORDERBOT_MGMT_ADDRESS }}",
          "PORT":"${{ secrets.ORDERBOT_MGMT_PORT }}",
          "GIN_MODE":"${{ secrets.ORDERBOT_MGMT_GIN_MODE }}",
          "BLUEPRINT_DB_DATABASE":"${{ secrets.ORDERBOT_MGMT_BLUEPRINT_DB_DATABASE }}",
          "BLUEPRINT_DB_PASSWORD":"${{ secrets.ORDERBOT_MGMT_BLUEPRINT_DB_PASSWORD }}",
          "BLUEPRINT_DB_USERNAME":"${{ secrets.ORDERBOT_MGMT_BLUEPRINT_DB_USERNAME }}",
          "BLUEPRINT_DB_PORT":"${{ secrets.ORDERBOT_MGMT_BLUEPRINT_DB_PORT }}",
          "BLUEPRINT_DB_HOST":"${{ secrets.ORDERBOT_MGMT_BLUEPRINT_DB_HOST }}",
          "BLUEPRINT_DB_SCHEMA":"${{ secrets.ORDERBOT_MGMT_BLUEPRINT_DB_SCHEMA }}",
          "BLUEPRINT_DB_ORDER_BOT_SCHEMA":"${{ secrets.ORDERBOT_MGMT_BLUEPRINT_DB_ORDER_BOT_SCHEMA }}"
        }

      # If your Terraform still requires aws_profile variable, set it to empty or a dummy value.
      # Better: delete this variable from Terraform and provider config for CI.
      TF_VAR_aws_profile: ""

    steps:
      - name: Decide enable_alb
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 1 * * 1-5" ]; then
              echo "TF_VAR_enable_alb=true" >> "$GITHUB_ENV"
            elif [ "${{ github.event.schedule }}" = "0 9 * * 1-5" ]; then
              echo "TF_VAR_enable_alb=false" >> "$GITHUB_ENV"
            fi
          else
            echo "TF_VAR_enable_alb=${{ inputs.enable_alb }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      # OIDC -> Assume AWS role (no AWS keys)
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-1
          role-to-assume: ${{ secrets.AWS_ARN_GACTION }}
          role-session-name: terraform-github-actions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: ./infra-terraform/environments/prod/
        run: terraform init

      # Optional: if you use workspaces
      # - name: Select workspace
      #   run: |
      #     terraform workspace select "${{ inputs.environment }}" || terraform workspace new "${{ inputs.environment }}"

      - name: Terraform Plan
        working-directory: ./infra-terraform/environments/prod/
        run: terraform plan -out tfplan

      - name: Terraform Apply
        working-directory: ./infra-terraform/environments/prod/
        run: terraform apply -auto-approve tfplan
